version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --prefer-offline
    build:
      commands:
        - npm run build
  artifacts:
    # Next.js SSR ke liye — static export NAHI
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*

  # Next.js SSR config (Server Side Rendering enable)
  # Amplify automatically detects Next.js and sets up SSR
